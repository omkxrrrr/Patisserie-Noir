<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- Primary SEO -->
    <title>Patisserie Noir — Custom Celebration Cakes, Made to Order</title>
    <meta name="description" content="Order custom birthday, wedding, and celebration cakes online. Design your cake, pick a delivery slot, and we'll bake it fresh. Browse the full cake menu at Patisserie Noir." />
    <meta name="keywords" content="custom cakes, birthday cakes, wedding cakes, cake delivery, order cake online, photo cakes, theme cakes" />
    <link rel="canonical" href="https://www.patisserienoir.example/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Patisserie Noir" />
    <meta property="og:title" content="Patisserie Noir — Custom Celebration Cakes, Made to Order" />
    <meta property="og:description" content="Design your cake, pick a delivery slot, and we'll bake it fresh." />
    <meta property="og:image" content="/og-cover.jpg" />
    <meta property="og:url" content="https://www.patisserienoir.example/" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Patisserie Noir — Custom Celebration Cakes" />
    <meta name="twitter:description" content="Design your cake, pick a delivery slot, and we'll bake it fresh." />
    <meta name="twitter:image" content="/og-cover.jpg" />

    <!-- PWA -->
    <meta name="theme-color" content="#3A1B14" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Structured data: Bakery / LocalBusiness -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Bakery",
        "name": "Patisserie Noir",
        "description": "Custom celebration cake shop accepting online cake order requests.",
        "url": "https://www.patisserienoir.example/",
        "priceRange": "₹₹"
      }
    </script>

    <!-- Fonts: Fraunces (display), Plus Jakarta Sans (body), IBM Plex Mono (data/utility) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,500&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-blush text-cocoa-700 font-body antialiased dark:bg-cocoa-900 dark:text-blush-deep transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
